<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – basirtech</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f7faff;
      margin: 0;
      color: #031330;
    }

    .wrap {
      max-width: 720px;
      margin: 80px auto;
      padding: 24px;
    }

    .card {
      background: white;
      border: 1px solid rgba(3,19,48,0.08);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 18px 50px rgba(3,19,48,0.08);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }

    p {
      color: #5b6b85;
      margin-bottom: 28px;
    }
.points{
  display:grid;
  gap:10px;
  margin-bottom:26px;
}

.point{
  font-size:14px;
  color:#5b6b85;
  background:rgba(147,185,249,0.08);
  padding:10px 14px;
  border-radius:12px;
}
    form {
      display: grid;
      gap: 16px;
    }

    input,
    textarea {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid rgba(3,19,48,0.12);
      font-family: inherit;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 16px 20px;
      background: #93B9F9;
      color: #031330;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Contact basirtech</h1>

<p>Tell us a little about your team and what you’d like to explore.</p>

<div class="points">
  <div class="point">• Request a personalised platform walkthrough</div>
  <div class="point">• See relevant audience intelligence use cases</div>
  <div class="point">• Discuss how basirtech can support your team</div>
</div>

<form action="https://formsubmit.co/leyelahuss49@gmail.com" method="POST">

  <input type="hidden" name="_subject" value="New basirtech enquiry">
  <input type="hidden" name="_captcha" value="false">

  <input type="text" name="name" placeholder="Your name" required />
  <input type="email" name="email" placeholder="Your email" required />
  <input type="text" name="company" placeholder="Company name" />

  <textarea name="message" placeholder="How can we help?" required></textarea>

  <button type="submit">Request demo</button>

</form>
  </div>
</body>
</html>
